build:
  maxIssues: 0

complexity:
  CyclomaticComplexMethod:
    threshold: 30
  LongMethod:
    threshold: 200
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 10
  NestedBlockDepth:
    threshold: 5
  TooManyFunctions:
    thresholdInFiles: 20
    thresholdInClasses: 20
    thresholdInInterfaces: 20
    thresholdInObjects: 20
    thresholdInEnums: 20

coroutines:
  active: true

naming:
  FunctionNaming:
    ignoreAnnotated:
      - 'Composable'
  MatchingDeclarationName:
    active: false

style:
  MagicNumber:
    active: false
  MaxLineLength:
    active: false
  ReturnCount:
    active: false
  WildcardImport:
    active: false

exceptions:
  SwallowedException:
    active: false
  TooGenericExceptionCaught:
    active: false
