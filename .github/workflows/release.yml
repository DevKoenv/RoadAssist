name: Release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew :app:androidApp:assembleRelease --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: app/androidApp/build/outputs/apk/release/*.apk

  build-linux:
    name: Linux DEB
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Build DEB package
        run: ./gradlew :app:desktopApp:packageDeb --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: app/desktopApp/build/compose/binaries/main/deb/*.deb

  build-windows:
    name: Windows MSI + EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Install WiX Toolset
        run: choco install wixtoolset --version 3.14.1 -y
        shell: pwsh

      - name: Build MSI and EXE installers
        run: ./gradlew :app:desktopApp:packageMsi :app:desktopApp:packageExe --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installers
          path: |
            app/desktopApp/build/compose/binaries/main/msi/*.msi
            app/desktopApp/build/compose/binaries/main/exe/*.exe

  build-macos:
    name: macOS DMG
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Build DMG
        run: ./gradlew :app:desktopApp:packageDmg --no-daemon

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: app/desktopApp/build/compose/binaries/main/dmg/*.dmg

  publish:
    name: Publish Release
    needs: [build-android, build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          generate_release_notes: true
          files: artifacts/**/*
